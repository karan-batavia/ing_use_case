services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: ing-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: inguser
      MONGO_INITDB_ROOT_PASSWORD: ingpassword
      MONGO_INITDB_DATABASE: ing_prompt_scrubber
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # FastAPI Backend
  fastapi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ing-fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - MONGODB_URL=mongodb://inguser:ingpassword@mongodb:27017/ing_prompt_scrubber?authSource=admin
      - GEMINI_API_KEY=${GEMINI_API_KEY}

    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - mongodb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Streamlit Frontend
  streamlit-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ing-streamlit
    ports:
      - "8501:8501"
    volumes:
      # Mount data directory as read-only to preserve classification files
      - ./data:/app/data:ro
      # Optional: Mount a logs directory for debugging
      - ./logs:/app/logs
    environment:
      # Streamlit configuration
      - STREAMLIT_THEME_BASE=light
      - STREAMLIT_THEME_PRIMARY_COLOR=#ff6b6b
      - STREAMLIT_THEME_BACKGROUND_COLOR=#ffffff
      - STREAMLIT_THEME_SECONDARY_BACKGROUND_COLOR=#f0f2f6
      - STREAMLIT_THEME_TEXT_COLOR=#262730
      # Python configuration
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - MONGODB_URI=mongodb://inguser:ingpassword@mongodb:27017/ing_prompt_scrubber?authSource=admin
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - mongodb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
        reservations:
          memory: 512M
          cpus: "0.25"

  # Optional: Add a reverse proxy for production
  # nginx:
  #   image: nginx:alpine
  #   container_name: ing-nginx-proxy
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - streamlit-app
  #     - fastapi-app
  #   restart: unless-stopped

# Persistent volumes
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

# Optional: Create a custom network
networks:
  default:
    name: ing-prompt-scrubber-network