version: "3.8"

services:
  streamlit-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ing-prompt-scrubber
    ports:
      - "8501:8501"
    volumes:
      # Mount data directory as read-only to preserve classification files
      - ./data:/app/data:ro
      # Optional: Mount a logs directory for debugging
      - ./logs:/app/logs
    environment:
      # Streamlit configuration
      - STREAMLIT_THEME_BASE=light
      - STREAMLIT_THEME_PRIMARY_COLOR=#ff6b6b
      - STREAMLIT_THEME_BACKGROUND_COLOR=#ffffff
      - STREAMLIT_THEME_SECONDARY_BACKGROUND_COLOR=#f0f2f6
      - STREAMLIT_THEME_TEXT_COLOR=#262730
      # Python configuration
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
        reservations:
          memory: 512M
          cpus: "0.25"

  # Optional: Add a reverse proxy for production
  # nginx:
  #   image: nginx:alpine
  #   container_name: ing-nginx-proxy
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - streamlit-app
  #   restart: unless-stopped

# Optional: Create a custom network
networks:
  default:
    name: ing-prompt-scrubber-network
